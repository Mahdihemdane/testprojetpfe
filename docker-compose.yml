services:
  # --- GATEWAY & REVERSE PROXY ---
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Dashboard Traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - medcore-net

  # --- AUTHENTICATION (IAM) ---
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: auth.localhost
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    # ports:
    #   - "8081:8080" # On passe par Traefik
    labels:
      - "traefik.http.routers.keycloak.rule=Host(`auth.localhost`)"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medcore-net

  # --- DATABASES (SQL & NOSQL) ---
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medcore-net

  mongodb:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodata:/data/db
    networks:
      - medcore-net

  # --- STREAMING & CACHE ---
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafkadata:/var/lib/kafka/data
    networks:
      - medcore-net

  redis:
    image: redis:alpine
    networks:
      - medcore-net

  # --- MEDCORE APPLICATIONS ---
  # Uncomment once backend and frontend code are generated
  backend:
    build: ./medcore-backend # Dossier Spring Boot
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    labels:
      - "traefik.http.routers.medcore-api.rule=Host(`api.localhost`)"
      - "traefik.http.services.medcore-api.loadbalancer.server.port=8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - medcore-net

  frontend:
    build: ./medcore-frontend # Dossier Angular
    labels:
      - "traefik.http.routers.medcore-ui.rule=Host(`localhost`) || Host(`app.localhost`)"
      - "traefik.http.services.medcore-ui.loadbalancer.server.port=80"
    depends_on:
      - backend
    networks:
      - medcore-net
  # ai-service:
  #   build: ./medcore-ai # Dossier FastAPI/Python
  #   depends_on:
  #     - mongodb
  #   networks:
  #     - medcore-net

volumes:
  pgdata:
  mongodata:
  kafkadata:


networks:
  medcore-net:
    driver: bridge
